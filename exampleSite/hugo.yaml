baseURL: 'https://bect.github.io/kopi/'
languageCode: 'en-US'
title: 'Kopi'
theme: 'kopi'
params:
  subtitle: 'A modern, fast, and responsive Hugo theme'
  author:
    name: "Kopi Author"
    bio: "Passionate about web development, open source, and creating fast user experiences."
    link: "/about"
    role: "Theme Developer"

menus:
  main:
    - name: 'Home'
      pageRef: '/'
      weight: 10
    - name: 'Topics'
      identifier: 'topics'
      url: '#'
      weight: 20
    - name: 'Hugo'
      parent: 'topics'
      pageRef: '/hugo'
      weight: 10
    - name: 'About'
      url: '#'
      weight: 30

module:
  hugoVersion:
    extended: true
    min: '0.146.0'

markup:
  goldmark:
    renderer:
      unsafe: true

mediaTypes:
  application/radio+json:
    suffixes:
      - json

outputFormats:
  RADIO:
    mediaType: application/radio+json
    baseName: radio
    isPlainText: true
    notAlternative: true

outputs:
  home:
    - HTML
    - RSS
    - JSON
    - RADIO