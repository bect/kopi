<!-- Toast Container -->
<div id="toastContainer" class="toast-container"></div>

<!-- Cookie Consent Banner -->
<div id="cookieBanner" class="cookie-banner">
    <div class="cookie-content">
        <h4>Cookie Policy</h4>
        <p>We use cookies to improve your experience and analyze site traffic.</p>
    </div>
    <div class="cookie-actions">
        <button class="btn btn-accept" id="btnAcceptCookies">Accept</button>
        <button class="btn btn-decline" id="btnDeclineCookies">Decline</button>
    </div>
</div>

<footer class="site-footer">
    <div class="container footer-content">
        <div>
            <strong class="footer-title">{{ .Site.Title }}</strong>
            {{ with .Site.Params.subtitle }}
                <span class="footer-subtitle">{{ . }}</span>
            {{ end }}
            <p>&copy; {{ now.Year }} {{ .Site.Title }}</p>
        </div>
        <div style="display:flex; gap: 1.5rem;">
            <a href="#">Twitter</a>
            <a href="#">Instagram</a>
            <a href="#">RSS</a>
        </div>
    </div>
</footer>

<!-- Back to Top Button -->
<button id="backToTop" class="back-to-top" aria-label="Back to Top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
</button>
