<!-- Tag Filter Bar -->
<div class="tag-scroll-container" id="tagFilters">
    <a href="{{ .Site.Home.RelPermalink }}" class="filter-btn {{ if .IsHome }}active{{ end }}">All</a>
    {{ $currentPermalink := .RelPermalink }}
    {{ range first 10 .Site.Taxonomies.tags.ByCount }}
    <a href="{{ .Page.RelPermalink }}" class="filter-btn {{ if eq .Page.RelPermalink $currentPermalink }}active{{ end }}">{{ .Page.Title }} <span class="tag-count">{{ .Count }}</span></a>
    {{ end }}
</div>
