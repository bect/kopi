{{ if .IsHome }}
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "WebSite",
    "url": "{{ .Site.BaseURL }}",
    "name": {{ .Site.Title | jsonify }},
    "description": {{ .Site.Params.description | default .Site.Title | jsonify }},
    "potentialAction": {
        "@type": "SearchAction",
        "target": "{{ .Site.BaseURL }}search/?q={search_term_string}",
        "query-input": "required name=search_term_string"
    }
}
</script>
{{ else if .IsPage }}
{{ $author := .Params.author | default .Site.Params.author | default .Site.Title }}
{{ $image := partial "func/GetImage.html" . }}
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": {{ .Title | jsonify }},
    "description": {{ .Summary | plainify | jsonify }},
    "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
    "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
    "wordCount": {{ .WordCount }},
    "url": "{{ .Permalink }}",
    "author": {
        "@type": "Person",
        "name": {{ $author | jsonify }}
    },
    "publisher": {
        "@type": "Organization",
        "name": {{ .Site.Title | jsonify }},
        "logo": {
            "@type": "ImageObject",
            "url": "{{ "icon-512.png" | absURL }}"
        }
    },
    "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "{{ .Permalink }}"
    }{{ if $image }},
    "image": {
        "@type": "ImageObject",
        "url": "{{ $image.Permalink }}"
    }{{ end }}
}
</script>
{{ end }}
