# .github/workflows/deploy.yml

name: Deploy Demo to GitHub Pages

on:
  # Runs on pushes targeting the default branch (main or master)
  push:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive # Fetch any Git submodules

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      # Create a symbolic link so Hugo can find the theme at 'exampleSite/themes/kopi'
      - name: Setup Theme
        run: |
          mkdir -p exampleSite/themes
          ln -s ../.. exampleSite/themes/kopi

      - name: Build
        run: hugo --gc --minify -s exampleSite

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the public directory from the exampleSite
          path: ./exampleSite/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4